name: Marketing Agent CI/CD

on:
  push:
    branches:
      - main

env:
  IMAGE_TAG: ${{ github.run_number }}

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🔹 Build and Push Backend
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/marketing-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/marketing-backend:${{ env.IMAGE_TAG }}

      # 🔹 Build and Push Frontend
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/marketing-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/marketing-frontend:${{ env.IMAGE_TAG }}

  deploy-to-ec2:
    name: Deploy to EC2 Kubernetes
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        env:
          GROQ_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DB_URL: ${{ secrets.DATABASE_URL }}
          IMAGE_TAG: ${{ github.run_number }}
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          # ✅ DOCKER_USER added so image names resolve correctly inside script
          envs: GROQ_KEY,OPENROUTER_KEY,DB_URL,IMAGE_TAG,DOCKER_USER
          script: |
            cd ~/marketing-planner-agent
            git pull origin main

            # 🔹 Update ConfigMap
            kubectl create configmap marketing-config \
              --from-literal=GROQ_API_KEY="$GROQ_KEY" \
              --from-literal=OPENROUTER_API_KEY="$OPENROUTER_KEY" \
              --from-literal=DATABASE_URL="$DB_URL" \
              --from-literal=VITE_API_URL="/api" \
              --from-literal=CORS_ORIGINS="*" \
              --dry-run=client -o yaml | kubectl apply -f -

            # ✅ Apply infra manifests FIRST (mysql, services)
            kubectl apply -f mysql.yaml
            kubectl apply -f services.yaml

            # ✅ Apply deployment AFTER configmap is ready
            # deployment.yaml should NOT hardcode image tags — use :latest as placeholder
            kubectl apply -f deployment.yaml

            # ✅ Now override with the exact versioned image built in this run
            # Make sure container names match what's defined in your deployment.yaml
            kubectl set image deployment/marketing-stack \
              backend=$DOCKER_USER/marketing-backend:$IMAGE_TAG \
              frontend=$DOCKER_USER/marketing-frontend:$IMAGE_TAG

            # ✅ Wait for rollout to fully complete
            kubectl rollout status deployment/marketing-stack --timeout=120s

            echo "================================================"
            echo " Deployment complete! Version: $IMAGE_TAG"
            echo "================================================"
            kubectl get pods -o wide
